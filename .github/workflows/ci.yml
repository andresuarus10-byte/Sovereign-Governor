name: ci
on: [push, pull_request]
jobs:
  receipts-before-crowns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: compile
        run: python -m py_compile governor.py braidkit.py
      - name: governor selftest (32)
        run: python governor.py selftest
      - name: braidkit selftest (5)
        run: python braidkit.py selftest
      - name: checksums hold
        run: sha256sum -c SHA256SUMS.txt
